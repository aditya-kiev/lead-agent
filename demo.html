<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Qualification Assistant — Live Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4F6F5;
    --panel: #FFFFFF;
    --ink: #14213D;
    --ink-soft: #3A4358;
    --muted: #6B7280;
    --hairline: #DEDCD4;
    --accent: #A63D2F;
    --accent-soft: #F3E4E0;
    --sage: #4C7A5B;
    --sage-soft: #E4EEE7;
    --brass: #B8903E;
    --brass-soft: #F3EAD6;
    --radius: 10px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    background-image:
      linear-gradient(var(--hairline) 1px, transparent 1px),
      linear-gradient(90deg, var(--hairline) 1px, transparent 1px);
    background-size: 32px 32px;
    background-position: -1px -1px;
    color: var(--ink);
    font-family: 'Public Sans', system-ui, sans-serif;
    min-height: 100vh;
  }

  .topbar {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 22px 32px;
    border-bottom: 1px solid var(--hairline);
    background: rgba(244, 246, 245, 0.85);
    backdrop-filter: blur(6px);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .brand {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .brand .dot { color: var(--accent); }

  .session-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  .layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 360px;
    gap: 24px;
    max-width: 1180px;
    margin: 28px auto;
    padding: 0 32px 40px;
    align-items: start;
  }

  @media (max-width: 880px) {
    .layout { grid-template-columns: 1fr; }
  }

  .chat-panel {
    background: var(--panel);
    border: 1px solid var(--hairline);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    height: 620px;
    overflow: hidden;
  }

  .chat-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--hairline);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .chat-header .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--ink);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fraunces', serif;
    font-size: 15px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .chat-header .title { font-weight: 600; font-size: 14.5px; }
  .chat-header .subtitle { font-size: 12.5px; color: var(--muted); }

  .status-pill {
    margin-left: auto;
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--sage);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .status-pill .led {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--sage);
    box-shadow: 0 0 0 3px var(--sage-soft);
  }

  .thread {
    flex: 1;
    overflow-y: auto;
    padding: 22px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .bubble-row { display: flex; }
  .bubble-row.lead { justify-content: flex-start; }
  .bubble-row.agent { justify-content: flex-end; }

  .bubble {
    max-width: 74%;
    padding: 11px 15px;
    font-size: 14.5px;
    line-height: 1.48;
    border-radius: 16px;
  }

  .bubble-row.lead .bubble {
    background: #EFEEE9;
    color: var(--ink);
    border-bottom-left-radius: 4px;
  }

  .bubble-row.agent .bubble {
    background: var(--ink);
    color: #F4F1EA;
    border-bottom-right-radius: 4px;
  }

  .typing {
    display: flex;
    gap: 4px;
    padding: 12px 15px;
    background: var(--ink);
    border-radius: 16px;
    border-bottom-right-radius: 4px;
    width: fit-content;
  }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: #B9BFD1;
    animation: bounce 1.1s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-4px); opacity: 1; } }

  .composer {
    display: flex;
    gap: 10px;
    padding: 14px 16px;
    border-top: 1px solid var(--hairline);
  }

  .composer input {
    flex: 1;
    border: 1px solid var(--hairline);
    border-radius: 8px;
    padding: 11px 13px;
    font-size: 14px;
    font-family: 'Public Sans', sans-serif;
    background: #FBFAF7;
    color: var(--ink);
  }
  .composer input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

  .composer button {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0 18px;
    font-family: 'Public Sans', sans-serif;
    font-weight: 600;
    font-size: 13.5px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .composer button:hover { background: #8E3527; }
  .composer button:disabled { background: #C9BFB8; cursor: default; }

  .quickstarts {
    padding: 0 16px 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .quickstarts button {
    background: transparent;
    border: 1px solid var(--hairline);
    color: var(--ink-soft);
    font-size: 12px;
    font-family: 'Public Sans', sans-serif;
    padding: 6px 11px;
    border-radius: 999px;
    cursor: pointer;
  }
  .quickstarts button:hover { border-color: var(--accent); color: var(--accent); }

  .record-panel {
    background: var(--panel);
    border: 1px solid var(--hairline);
    border-radius: var(--radius);
    overflow: hidden;
    position: sticky;
    top: 88px;
  }

  .record-header { padding: 16px 20px 14px; border-bottom: 1px solid var(--hairline); }

  .record-header .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .record-header .heading {
    font-family: 'Fraunces', serif;
    font-size: 19px;
    font-weight: 600;
    margin-top: 2px;
  }

  .record-body { padding: 6px 0; }

  .field-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 12px 20px;
    border-bottom: 1px solid #F0EEE9;
    transition: background 0.5s ease;
  }
  .field-row:last-child { border-bottom: none; }
  .field-row.flash { background: var(--brass-soft); }

  .field-label { font-size: 12px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }

  .field-value {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--ink);
    text-align: right;
    max-width: 60%;
  }
  .field-value.empty { color: #B7B2A9; font-style: italic; font-weight: 400; }

  .status-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11.5px;
    font-weight: 600;
    font-family: 'IBM Plex Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .status-badge.cold { background: #EDEBE6; color: var(--muted); }
  .status-badge.warm { background: var(--brass-soft); color: #8A6A29; }
  .status-badge.hot { background: var(--sage-soft); color: var(--sage); }
  .status-badge.unqualified { background: var(--accent-soft); color: var(--accent); }

  .record-footer { padding: 16px 20px; background: #FAF9F6; border-top: 1px solid var(--hairline); }
  .record-footer .footnote { font-size: 11.5px; color: var(--muted); line-height: 1.5; }

  .booking-flag {
    margin-top: 10px;
    padding: 9px 12px;
    background: var(--sage-soft);
    border-radius: 8px;
    font-size: 12.5px;
    color: var(--sage);
    font-weight: 600;
    display: none;
  }
  .booking-flag.show { display: block; }
</style>
</head>
<body>

  <div class="topbar">
    <div class="brand">Meridian<span class="dot">.</span>ai</div>
    <div class="session-tag" id="sessionTag">session · —</div>
  </div>

  <div class="layout">

    <div class="chat-panel">
      <div class="chat-header">
        <div class="avatar">M</div>
        <div>
          <div class="title">Meridian Assistant</div>
          <div class="subtitle">Responds instantly · Every lead, every hour</div>
        </div>
        <div class="status-pill"><span class="led"></span>Live</div>
      </div>

      <div class="thread" id="thread"></div>

      <div class="quickstarts" id="quickstarts">
        <button data-msg="Hi, I'm looking to buy a 3BHK in Noida under 80 lakh">3BHK in Noida, ₹80L budget</button>
        <button data-msg="What's your process for scheduling a site visit?">Ask about site visits</button>
        <button data-msg="This seems a bit out of my budget right now">Raise a budget objection</button>
      </div>

      <div class="composer">
        <input type="text" id="msgInput" placeholder="Type a message as the lead…" autocomplete="off">
        <button id="sendBtn">Send</button>
      </div>
    </div>

    <div class="record-panel">
      <div class="record-header">
        <div class="eyebrow">Captured automatically</div>
        <div class="heading">Lead record</div>
      </div>
      <div class="record-body" id="recordBody"></div>
      <div class="record-footer">
        <div class="footnote">Every field below was extracted from the conversation on the left — no form, no manual entry.</div>
        <div class="booking-flag" id="bookingFlag">✓ Meeting confirmed</div>
      </div>
    </div>

  </div>

<script>
  const API_BASE = "http://127.0.0.1:8000";
  const API_KEY = ""; // paste your webhook API key here if you've set one in .env

  const sessionId = "demo-" + crypto.randomUUID().slice(0, 8);
  document.getElementById("sessionTag").textContent = "session · " + sessionId;

  const thread = document.getElementById("thread");
  const input = document.getElementById("msgInput");
  const sendBtn = document.getElementById("sendBtn");
  const quickstarts = document.getElementById("quickstarts");

  const FIELDS = [
    { key: "lead_name", label: "Name" },
    { key: "industry", label: "Looking for" },
    { key: "budget", label: "Budget", format: v => v ? "₹" + Number(v).toLocaleString("en-IN") : null },
    { key: "timeline", label: "Timeline" },
    { key: "problem_statement", label: "Notes" },
    { key: "qualification_score", label: "Score", format: v => v != null ? (v * 100).toFixed(0) + "%" : null },
  ];

  let lastRecord = {};

  function renderRecord(record) {
    const body = document.getElementById("recordBody");
    body.innerHTML = "";

    const statusRow = document.createElement("div");
    statusRow.className = "field-row";
    const status = (record.lead_status || "cold").toLowerCase();
    statusRow.innerHTML = `
      <span class="field-label">Status</span>
      <span class="status-badge ${status}">${status}</span>
    `;
    body.appendChild(statusRow);

    FIELDS.forEach(f => {
      const raw = record[f.key];
      const changed = lastRecord[f.key] !== raw && raw != null;
      const display = raw != null ? (f.format ? f.format(raw) : raw) : "not yet captured";
      const row = document.createElement("div");
      row.className = "field-row" + (changed ? " flash" : "");
      row.innerHTML = `
        <span class="field-label">${f.label}</span>
        <span class="field-value ${raw == null ? "empty" : ""}">${display}</span>
      `;
      body.appendChild(row);
      if (changed) setTimeout(() => row.classList.remove("flash"), 900);
    });

    document.getElementById("bookingFlag").classList.toggle("show", !!record.booking_confirmed);
    lastRecord = record;
  }

  renderRecord({});

  function addBubble(role, text) {
    const row = document.createElement("div");
    row.className = "bubble-row " + (role === "lead" ? "lead" : "agent");
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    row.appendChild(bubble);
    thread.appendChild(row);
    thread.scrollTop = thread.scrollHeight;
    return row;
  }

  function showTyping() {
    const row = document.createElement("div");
    row.className = "bubble-row agent";
    row.id = "typingRow";
    row.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
    thread.appendChild(row);
    thread.scrollTop = thread.scrollHeight;
  }

  function hideTyping() {
    const row = document.getElementById("typingRow");
    if (row) row.remove();
  }

  async function refreshRecord() {
    try {
      const headers = {};
      if (API_KEY) headers["x-api-key"] = API_KEY;
      const res = await fetch(`${API_BASE}/conversation/${sessionId}`, { headers });
      if (!res.ok) return;
      const data = await res.json();
      renderRecord(data);
    } catch (e) {
      console.warn("record refresh failed", e);
    }
  }

  async function sendMessage(text) {
    if (!text.trim()) return;
    input.value = "";
    sendBtn.disabled = true;
    quickstarts.style.display = "none";

    addBubble("lead", text);
    showTyping();

    try {
      const headers = { "Content-Type": "application/json" };
      if (API_KEY) headers["x-api-key"] = API_KEY;

      const res = await fetch(`${API_BASE}/webhook/message`, {
        method: "POST",
        headers,
        body: JSON.stringify({ session_id: sessionId, message: text, channel: "web" }),
      });

      hideTyping();

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        addBubble("agent", "⚠ " + (err.detail || "Something went wrong. Please try again."));
        return;
      }

      const data = await res.json();
      addBubble("agent", data.reply);
      await refreshRecord();
    } catch (e) {
      hideTyping();
      addBubble("agent", "⚠ Couldn't reach the assistant. Is the server running?");
      console.error(e);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener("click", () => sendMessage(input.value));
  input.addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(input.value); });
  quickstarts.addEventListener("click", e => {
    const btn = e.target.closest("button[data-msg]");
    if (btn) sendMessage(btn.dataset.msg);
  });

  window.addEventListener("DOMContentLoaded", () => {
    sendMessage("Hi, I'm interested in your properties.");
  });
</script>
</body>
</html>
